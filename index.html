<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Convite</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="videoTela" class="video-tela">

    <video id="videoConvite" controls playsinline>

        <source src="assets/video/convite.mp4" type="video/mp4">

    </video>

</div>

<div id="conviteTela" class="convite-tela">

    <img src="assets/img/convite.png" class="convite-img">

    <a
        href="https://forms.gle/Bq2ZrjzfvrhunjG3A"
        target="_blank"
        class="botao"
        id="botao">

        Confirmar Presença

    </a>

</div>

<script>

const video=document.getElementById("videoConvite");
const videoTela=document.getElementById("videoTela");
const conviteTela=document.getElementById("conviteTela");
const botao=document.getElementById("botao");

video.addEventListener("ended",()=>{

    videoTela.classList.add("sumir");

    setTimeout(()=>{

        videoTela.style.display="none";

        conviteTela.classList.add("mostrar");

    },600);

    setTimeout(()=>{

        botao.classList.add("mostrarBotao");

    },1200);

});

</script>

</body>

</html>

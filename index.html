<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<section class="video">

<video id="videoConvite" controls playsinline width="100%">

<source src="assets/video/convite.mp4" type="video/mp4">

</video>

</section>

<section class="conteudo" id="conteudo">

<img src="assets/img/convite.png" class="convite-img" id="convite">

<a
class="botao"
id="botao"
href="https://forms.gle/Bq2ZrjzfvrhunjG3A"
target="_blank">

Confirmar Presença

</a>

</section>

<script>

const video=document.getElementById("videoConvite");

const convite=document.getElementById("convite");

const botao=document.getElementById("botao");

convite.style.display="none";
botao.style.display="none";

video.addEventListener("ended",()=>{

convite.style.display="block";

setTimeout(()=>{

convite.classList.add("mostrar");

},100);

setTimeout(()=>{

botao.style.display="block";
botao.classList.add("mostrar");

},1000);

});

</script>

</body>

</html>

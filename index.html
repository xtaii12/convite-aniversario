<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="videoTela" class="tela ativa">

    <video id="video" controls playsinline>
        <source src="assets/video/convite.mp4" type="video/mp4">
    </video>

</div>

<div id="conviteTela" class="tela">

    <img src="assets/img/convite.png" class="convite">

    <a
        href="https://forms.gle/Bq2ZrjzfvrhunjG3A"
        target="_blank"
        class="botao">

        Confirmar Presença

    </a>

</div>

<script>

const video=document.getElementById("video");

const videoTela=document.getElementById("videoTela");

const conviteTela=document.getElementById("conviteTela");

video.addEventListener("ended",()=>{

    videoTela.classList.remove("ativa");

    conviteTela.classList.add("ativa");

});

</script>

</body>
</html>
